  <ellipse cx="256" cy="120" rx="28" ry="55" fill="#e8b4b0" opacity="0.7" transform="rotate(0,256,220)"/>
  <ellipse cx="256" cy="120" rx="28" ry="55" fill="#e8b4b0" opacity="0.7" transform="rotate(45,256,220)"/>
